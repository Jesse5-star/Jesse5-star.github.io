<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesse5-Star Website</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:system-ui,-apple-system,sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:20px;
text-align:center;
}
h1{
font-size:clamp(2.5rem,8vw,4rem);
margin-bottom:1rem;
text-shadow:0 4px 20px rgba(0,0,0,.3);
}
p{
font-size:1.1rem;
max-width:550px;
line-height:1.6;
margin-bottom:2rem;
}
.btn{
background:#10b981;
color:white;
padding:1rem 2rem;
border-radius:50px;
text-decoration:none;
font-weight:600;
display:inline-block;
box-shadow:0 8px 25px rgba(16,185,129,.4);
transition:all .3s;
}
.btn:hover{
transform:translateY(-2px);
box-shadow:0 12px 35px rgba(16,185,129,.6);
}
.status{
background:rgba(255,255,255,.15);
padding:1rem 2rem;
border-radius:25px;
border:1px solid rgba(255,255,255,.2);
margin-top:2rem;
backdrop-filter:blur(10px);
}
.emoji{
font-size:4rem;
margin-bottom:1rem;
animation:bounce 2s infinite;
}
@keyframes bounce{
0%,20%,50%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-20px);}
60%{transform:translateY(-10px);}
}
</style>
</head>
<body>
<div class="emoji">🚀</div>
<h1>JESSE5-STAR.GITHUB.IO</h1>
<p>✅ Website permanen gratis sudah <strong>LIVE</strong>!<br>
GitHub Pages hosting selamanya tanpa biaya.</p>
<a href="https://jesse5-star.github.io" class="btn">Buka Website</a>
<div class="status">GitHub Pages • HTTPS • CDN • Gratis Forever</div>
</body>
</html>
