<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Saya - Gratis Permanen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            line-height: 1.6; 
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            padding: 60px 0; 
            text-align: center;
        }
        .hero h1 { font-size: 3em; margin-bottom: 10px; }
        .btn { 
            display: inline-block; 
            background: #ff6b6b; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 50px; 
            margin-top: 20px;
        }
        .content { padding: 50px 0; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🌟 Website Saya</h1>
            <p>Website permanen gratis dengan GitHub Pages</p>
            <a href="#features" class="btn">Lihat Fitur</a>
        </div>
    </header>
    
    <section class="content">
        <div class="container">
            <h2 style="text-align: center; margin-bottom: 30px;">Kenapa Pilih Ini?</h2>
            <div class="features">
                <div class="card">
                    <h3>✅ Gratis Selamanya</h3>
                    <p>Tanpa biaya bulanan, hosting permanen</p>
                </div>
                <div class="card">
                    <h3>⚡ Super Cepat</h3>
                    <p>CDN global, loading kilat</p>
                </div>
                <div class="card">
                    <h3>🔧 Custom Domain</h3>
                    <p>Bisa pakai domain sendiri gratis</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
